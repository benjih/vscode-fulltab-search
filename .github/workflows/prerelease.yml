name: Pre-release

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            use_devbox: true
          - os: ubuntu-latest
            target: linux-arm64
            use_devbox: true
          - os: macos-latest
            target: darwin-arm64
            use_devbox: true
          - os: macos-latest
            target: darwin-x64
            use_devbox: true
          - os: windows-latest
            target: win32-x64
            use_devbox: false
          - os: windows-latest
            target: win32-arm64
            use_devbox: false
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - uses: jetify-com/devbox-install-action@v0.15.0
        if: matrix.use_devbox
        with:
          enable-cache: true

      - uses: actions/setup-node@v6.5.0
        if: ${{ !matrix.use_devbox }}
        with:
          node-version: "22"

      - name: Set version
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          # Base on the latest stable release tag; prerelease tags (v*-<sha>) are excluded.
          BASE=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          BASE="${BASE#v}"
          # Bump the patch so prereleases target the next upcoming version.
          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE:-0.0.0}"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          VERSION="v${NEXT}-${SHORT_SHA}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build and package (devbox)
        if: matrix.use_devbox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: devbox run -- make build && devbox run -- npm run package -- --target ${{ matrix.target }}

      - name: Build and package
        if: ${{ !matrix.use_devbox }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci && npm run compile && npm run package -- --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BASE=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          BASE="${BASE#v}"
          # Bump the patch so prereleases target the next upcoming version.
          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE:-0.0.0}"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=v${NEXT}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          prerelease: true
          files: "*.vsix"
