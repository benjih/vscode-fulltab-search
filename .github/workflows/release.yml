name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: macos-latest
            target: darwin-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Set version to commit SHA
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          CURRENT_VERSION=$(jq -r '.version' package.json)
          NEW_VERSION="${CURRENT_VERSION}-${SHORT_SHA}"
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build and package
        run: devbox run -- make build && devbox run -- npm run package -- --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "version=${CURRENT_VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          prerelease: true
          files: "*.vsix"
