name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            use_devbox: true
          - os: ubuntu-latest
            target: linux-arm64
            use_devbox: true
          - os: macos-latest
            target: darwin-arm64
            use_devbox: true
          - os: macos-latest
            target: darwin-x64
            use_devbox: true
          - os: windows-latest
            target: win32-x64
            use_devbox: false
          - os: windows-latest
            target: win32-arm64
            use_devbox: false
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: jetify-com/devbox-install-action@v0.15.0
        if: matrix.use_devbox
        with:
          enable-cache: true

      - uses: actions/setup-node@v7.0.0
        if: ${{ !matrix.use_devbox }}
        with:
          node-version: "22"

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build and package (devbox)
        if: matrix.use_devbox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: devbox run -- make build && devbox run -- npm run package -- --target ${{ matrix.target }}

      - name: Build and package
        if: ${{ !matrix.use_devbox }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci && npm run compile && npm run package -- --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v5.0.0
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: "*.vsix"

  publish-vsce:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "22"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          for f in *.vsix; do
            vsce publish --pat "$VSCE_PAT" --packagePath "$f"
          done

  publish-ovsx:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "22"

      - name: Install ovsx
        run: npm install -g ovsx

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          for f in *.vsix; do
            ovsx publish "$f" -p "$OVSX_PAT"
          done
