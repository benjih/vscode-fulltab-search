name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Set version to commit SHA
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          CURRENT_VERSION=$(jq -r '.version' package.json)
          jq --arg v "${CURRENT_VERSION}-${SHORT_SHA}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build package
        run: devbox run -- make package

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.sha }}
          name: ${{ github.sha }}
          files: "*.vsix"
