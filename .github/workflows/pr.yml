name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [lint, test, build, test-ui]
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Run target
        run: |
          if [ "${{ matrix.target }}" = "test-ui" ]; then
            devbox run -- env EXTENSIONS_FOLDER=.test-extensions EXTENSION_DEV_PATH="$GITHUB_WORKSPACE" xvfb-run -a make test-ui
          elif [ "${{ matrix.target }}" = "test" ]; then
            devbox run -- xvfb-run -a make test
          else
            devbox run -- make ${{ matrix.target }}
          fi
